<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход — TS Laser CRM</title>
    <link rel="stylesheet" href="/static/css/styles.css?v=2">
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect fill='%23FCD34D' width='100' height='100' rx='20'/><text y='70' x='50' text-anchor='middle' font-size='60'>⚡</text></svg>">
</head>
<body>
    <div class="login-container">
        <div class="card login-card animate-slideUp">
            <div class="text-center mb-6">
                <img src="/static/logo.png" alt="TS Laser" class="login-logo">
            </div>
            
            <form id="login-form">
                <div class="form-group">
                    <label class="form-label" for="password">Пароль</label>
                    <input 
                        type="password" 
                        id="password" 
                        class="input" 
                        placeholder="Введите пароль..."
                        autocomplete="current-password"
                        required
                    >
                </div>
                
                <div id="error-message" class="text-center text-sm hidden" style="color: var(--color-danger); margin-bottom: 16px;"></div>
                
                <button type="submit" class="btn btn-primary w-full">
                    Войти
                </button>
            </form>
        </div>
    </div>

    <script>
        const form = document.getElementById('login-form');
        const errorMessage = document.getElementById('error-message');
        
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const password = document.getElementById('password').value;
            errorMessage.classList.add('hidden');
            
            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ password })
                });
                
                if (response.ok) {
                    window.location.href = '/';
                } else {
                    const data = await response.json();
                    errorMessage.textContent = data.detail || 'Неверный пароль';
                    errorMessage.classList.remove('hidden');
                }
            } catch (error) {
                errorMessage.textContent = 'Ошибка соединения';
                errorMessage.classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
